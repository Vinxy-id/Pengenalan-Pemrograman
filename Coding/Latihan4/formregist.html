<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Registrasi</title>
    <link rel="stylesheet" href="formlogin.css">
</head>
<body>
    <div class="login">
        <h2>Signup To Vinxy.id</h2>
        <form>
            <div class="text1">Email :</div>
            <input type="email" placeholder="Enter your email">
            <div class="text1">Password :</div>
            <input type="password" placeholder="Create a password">
            <div class="text1">Confirm Password :</div>
            <input type="password" placeholder="Confirm your password">
            <button type="submit">Signup</button>
        </form>
        <p style="margin-top: 15px; font-size: 14px; color: rgb(84, 99, 113);">
            Already have an account? <a href="formlogin.html" style="color: rgb(0, 85, 255); text-decoration: none; font-weight: bold;">Login</a>
        </p>
    </div>
</body>
</html>
