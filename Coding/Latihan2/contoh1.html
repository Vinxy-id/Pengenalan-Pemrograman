<!DOCTYPE html>
<html>
<head>
    <title>Membuat Tabel dalam HTML</title>
</head>
<body>

    <p><strong>Nama:</strong> Nama Kalian</p>
    <p><strong>NPM:</strong> NPM</p>

    <h2>Membuat Tabel dalam HTML</h2>

    <table border="1">
        <tr>
            <th>No</th>
            <th>Nama Obat</th>
            <th>Kategori</th>
            <th>Dosis (mg)</th>
            <th>Harga per Unit</th>
            <th>Bentuk</th>
            <th>Stok</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Paracetamol</td>
            <td rowspan="2">Analgesik</td>
            <td>500</td>
            <td>100</td>
            <td rowspan="2">Tablet</td>
            <td>5000</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Ibuprofen</td>
            <td>400</td>
            <td>80</td>
            <td>8000</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Amoxicillin</td>
            <td rowspan="2">Antibiotik</td>
            <td>500</td>
            <td>100</td>
            <td rowspan="2">Kapsul</td>
            <td>10000</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Cefadroxil</td>
            <td>500</td>
            <td>90</td>
            <td>100</td>
        </tr>
        <tr>
            <td>5</td>
            <td>Vitamin C</td>
            <td>Suplemen</td>
            <td>500</td>
            <td>150</td>
            <td>Tablet</td>
            <td>7000</td>
        </tr>
    </table>

</body>
</html>
